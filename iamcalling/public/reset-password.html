<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - IAMCALLING</title>
    <link rel="stylesheet" href="css/mobile-responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f8f8 0%, #e0e0e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }
        .reset-icon {
            font-size: 3rem;
            color: #2d5a2d;
            text-align: center;
            margin-bottom: 20px;
        }
        h2 {
            color: #0a1f0a;
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #0a1f0a;
        }
        .pin-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .pin-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .pin-input:focus {
            outline: none;
            border-color: #2d5a2d;
            box-shadow: 0 0 0 3px rgba(45, 90, 45, 0.2);
        }
        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, #2d5a2d, #d4af37);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .reset-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #2d5a2d;
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(150%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .notification.show { transform: translateX(0); }
        .notification.error { background: #dc3545; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h2>Create New Password</h2>
        <p>Enter your new 4-character PIN</p>
        
        <form id="resetPasswordForm">
            <div class="form-group">
                <label>New PIN</label>
                <div class="pin-container">
                    <input type="text" class="pin-input" id="pin1" maxlength="1" required>
                    <input type="text" class="pin-input" id="pin2" maxlength="1" required>
                    <input type="text" class="pin-input" id="pin3" maxlength="1" required>
                    <input type="text" class="pin-input" id="pin4" maxlength="1" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirm PIN</label>
                <div class="pin-container">
                    <input type="text" class="pin-input" id="cpin1" maxlength="1" required>
                    <input type="text" class="pin-input" id="cpin2" maxlength="1" required>
                    <input type="text" class="pin-input" id="cpin3" maxlength="1" required>
                    <input type="text" class="pin-input" id="cpin4" maxlength="1" required>
                </div>
            </div>
            
            <button type="submit" class="reset-btn">Reset Password</button>
        </form>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        console.log('Token from URL:', token);
        
        if (!token) {
            alert('Invalid reset link - no token found');
            window.location.href = '15-login.html';
        }
        
        // Verify token on page load
        fetch(`/api/password-reset/verify-token/${token}`)
            .then(res => {
                console.log('Verify response status:', res.status);
                return res.json();
            })
            .then(data => {
                console.log('Verify response data:', data);
                if (!data.success) {
                    alert(data.message || 'Invalid or expired reset token');
                    window.location.href = '20-password_reset.html';
                }
            })
            .catch(error => {
                console.error('Token verification error:', error);
                alert('Failed to verify reset link');
                window.location.href = '20-password_reset.html';
            });
        
        // PIN input handling
        const pinInputs = ['pin1', 'pin2', 'pin3', 'pin4'];
        const confirmPinInputs = ['cpin1', 'cpin2', 'cpin3', 'cpin4'];
        
        function setupPinInputs(inputs) {
            inputs.forEach((id, index) => {
                const input = document.getElementById(id);
                input.addEventListener('input', function() {
                    let value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    this.value = value;
                    if (value && index < inputs.length - 1) {
                        document.getElementById(inputs[index + 1]).focus();
                    }
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        document.getElementById(inputs[index - 1]).focus();
                    }
                });
            });
        }
        
        setupPinInputs(pinInputs);
        setupPinInputs(confirmPinInputs);
        
        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pin = pinInputs.map(id => document.getElementById(id).value).join('');
            const confirmPin = confirmPinInputs.map(id => document.getElementById(id).value).join('');
            const submitBtn = e.target.querySelector('.reset-btn');
            const notification = document.getElementById('notification');
            
            if (pin.length !== 4) {
                notification.textContent = 'Please enter 4-character PIN';
                notification.classList.add('error', 'show');
                setTimeout(() => notification.classList.remove('show'), 3000);
                return;
            }
            
            if (pin !== confirmPin) {
                notification.textContent = 'PINs do not match';
                notification.classList.add('error', 'show');
                setTimeout(() => notification.classList.remove('show'), 3000);
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            try {
                const response = await fetch('/api/password-reset/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: pin })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    notification.textContent = 'Password reset successfully!';
                    notification.classList.remove('error');
                    notification.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = '15-login.html';
                    }, 2000);
                } else {
                    notification.textContent = data.message;
                    notification.classList.add('error', 'show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                    setTimeout(() => notification.classList.remove('show'), 3000);
                }
            } catch (error) {
                notification.textContent = 'Failed to reset password';
                notification.classList.add('error', 'show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
                setTimeout(() => notification.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
