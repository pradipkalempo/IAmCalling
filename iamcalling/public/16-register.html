<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - IAMCALLING</title>
    <link rel="stylesheet" href="css/mobile-responsive.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #f8f8f8 0%, #e0e0e0 100%);
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            overflow: hidden;
        }
        
        .register-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            overflow-y: auto;
        }
        
        .register-form {
            background: white;
            border-radius: 10px;
            padding: 12px 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .register-header h1 {
            font-size: 1.4rem;
            color: #0a1f0a;
            margin-bottom: 2px;
        }
        
        .register-header p {
            font-size: 0.8rem;
            color: #666;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 6px;
        }
        
        .form-group {
            margin-bottom: 6px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 3px;
            font-weight: 500;
            color: #0a1f0a;
            font-size: 0.8rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.85rem;
            color: #333;
            background: white;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2d5a2d;
            box-shadow: 0 0 0 2px rgba(45, 90, 45, 0.1);
        }
        
        .pin-container {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        
        .pin-input {
            width: 38px !important;
            height: 38px !important;
            text-align: center !important;
            font-size: 1.1rem !important;
            font-weight: bold !important;
            border: 1px solid #ddd !important;
            border-radius: 5px !important;
            padding: 0 !important;
        }
        
        .pin-input:focus {
            border-color: #2d5a2d !important;
            box-shadow: 0 0 0 2px rgba(45, 90, 45, 0.2) !important;
        }
        
        .photo-upload {
            text-align: center;
            margin: 0;
        }
        
        .photo-preview {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #2d5a2d;
            margin: 0 auto 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        .photo-preview i {
            font-size: 1.2rem;
            color: #999;
        }
        
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-upload input[type="file"] {
            display: none;
        }
        
        .photo-upload-btn {
            background: #2d5a2d;
            color: white;
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .checkbox-group input[type="checkbox"] {
            position: absolute;
            opacity: 0;
        }
        
        .checkbox-group label {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 22px;
            font-size: 0.8rem;
        }
        
        .checkbox-group label::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border: 2px solid #2d5a2d;
            border-radius: 3px;
            background: white;
        }
        
        .checkbox-group label::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%) rotate(45deg) scale(0);
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transition: all 0.3s;
        }
        
        .checkbox-group input[type="checkbox"]:checked + label::before {
            background: #2d5a2d;
        }
        
        .checkbox-group input[type="checkbox"]:checked + label::after {
            transform: translateY(-50%) rotate(45deg) scale(1);
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2d5a2d, #d4af37);
            color: #000;
            border: 2px solid #d4af37;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            margin: 6px 0 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .submit-btn.loading .btn-spinner {
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .login-link {
            text-align: center;
            margin-top: 4px;
        }
        
        .login-link p {
            font-size: 0.8rem;
            margin: 0;
        }
        
        .login-link a {
            color: #2d5a2d;
            text-decoration: none;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="topbar-container"></div>
    
    <div class="register-container">
        <div class="register-form">
            <div class="register-header">
                <h1>Create Account</h1>
                <p>Join IAMCALLING</p>
            </div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label>4-Character PIN</label>
                    <div class="pin-container">
                        <input type="text" class="pin-input" id="pin1" maxlength="1" required>
                        <input type="text" class="pin-input" id="pin2" maxlength="1" required>
                        <input type="text" class="pin-input" id="pin3" maxlength="1" required>
                        <input type="text" class="pin-input" id="pin4" maxlength="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm PIN</label>
                    <div class="pin-container">
                        <input type="text" class="pin-input" id="cpin1" maxlength="1" required>
                        <input type="text" class="pin-input" id="cpin2" maxlength="1" required>
                        <input type="text" class="pin-input" id="cpin3" maxlength="1" required>
                        <input type="text" class="pin-input" id="cpin4" maxlength="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="photo-upload">
                        <div class="photo-preview" id="photoPreview">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="file" id="profilePhoto" accept="image/*">
                        <button type="button" class="photo-upload-btn" onclick="document.getElementById('profilePhoto').click()">Upload Photo</button>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-spinner"></span>
                </button>
            </form>
            
            <div class="login-link">
                <p>Have an account? <a href="15-login.html">Sign in</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/universal-topbar-injector.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        localStorage.removeItem('iamcalling_current_user');
        sessionStorage.removeItem('iamcalling_current_user');
        
        document.addEventListener('DOMContentLoaded', function() {
            const pinInputs = ['pin1', 'pin2', 'pin3', 'pin4'];
            const confirmPinInputs = ['cpin1', 'cpin2', 'cpin3', 'cpin4'];
            
            function setupPinInputs(inputs) {
                inputs.forEach((id, index) => {
                    const input = document.getElementById(id);
                    if (!input) return;
                    
                    input.addEventListener('input', function() {
                        let value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                        this.value = value;
                        if (value && index < inputs.length - 1) {
                            document.getElementById(inputs[index + 1]).focus();
                        }
                    });
                    
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && !this.value && index > 0) {
                            document.getElementById(inputs[index - 1]).focus();
                        }
                    });
                });
            }
            
            setupPinInputs(pinInputs);
            setupPinInputs(confirmPinInputs);
            
            document.getElementById('profilePhoto').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('photoPreview').innerHTML = `<img src="${e.target.result}" alt="Profile">`;
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                submitBtn.querySelector('.btn-text').textContent = 'Creating...';
                
                const pin = pinInputs.map(id => document.getElementById(id).value).join('');
                const confirmPin = confirmPinInputs.map(id => document.getElementById(id).value).join('');
                
                if (pin.length !== 4 || pin !== confirmPin) {
                    alert('PIN mismatch or invalid');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.querySelector('.btn-text').textContent = 'Create Account';
                    return;
                }
                
                const firstName = document.getElementById('firstName').value;
                const lastName = document.getElementById('lastName').value;
                const email = document.getElementById('email').value;
                const photoFile = document.getElementById('profilePhoto').files[0];
                
                let profilePhoto = null;
                if (photoFile) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        profilePhoto = e.target.result;
                        saveUser();
                    };
                    reader.readAsDataURL(photoFile);
                } else {
                    saveUser();
                }
                
                async function saveUser() {
                    try {
                        let cloudinaryPhotoUrl = null;
                        
                        if (profilePhoto) {
                            const uploadResponse = await fetch('/api/upload/upload-profile-photo', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ image: profilePhoto, userId: 'temp_' + Date.now() })
                            });
                            const uploadResult = await uploadResponse.json();
                            if (uploadResult.success) cloudinaryPhotoUrl = uploadResult.photoUrl;
                        }
                        
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                firstName, lastName, email,
                                password: pin,
                                profilePhoto: cloudinaryPhotoUrl || profilePhoto
                            })
                        });
                        
                        const result = await response.json();
                        
                        if (!response.ok || !result.success) {
                            alert(result.message || 'Registration failed');
                            submitBtn.disabled = false;
                            submitBtn.classList.remove('loading');
                            submitBtn.querySelector('.btn-text').textContent = 'Create Account';
                            return;
                        }
                        
                        localStorage.setItem('persistentLogin', 'true');
                        localStorage.setItem('userAuth', 'true');
                        localStorage.setItem('currentUser', JSON.stringify(result.user));
                        
                        submitBtn.querySelector('.btn-text').textContent = '✅ Success!';
                        setTimeout(() => window.location.href = '18-profile.html', 1000);
                        
                    } catch (error) {
                        alert('Registration failed. Please try again.');
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('loading');
                        submitBtn.querySelector('.btn-text').textContent = 'Create Account';
                    }
                }
            });
        });
    </script>
</body>
</html>
